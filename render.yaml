services:
  # Backend Django Service
  - type: web
    name: esg-backend
    env: python
    plan: free
    rootDir: backend
    buildCommand: "pip install -r requirements.txt && python manage.py migrate && python manage.py seed_data"
    startCommand: "gunicorn esg_project.wsgi:application --bind 0.0.0.0:$PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.13.5
      - key: DISABLE_COLLECTSTATIC
        value: "1"

  # Frontend Static Site
  - type: web
    name: esg-frontend
    runtime: static
    plan: free
    rootDir: frontend
    buildCommand: "npm run build"
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: "/*"
        destination: "/index.html"
    envVars:
      - key: VITE_API_URL
        fromService:
          name: esg-backend
          type: web
          property: host
